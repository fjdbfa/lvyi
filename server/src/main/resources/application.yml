# 豆包（火山引擎 Ark）
# ⚠️ 不要把 API Key 写死在 yml 里，改用环境变量 DOUBAO_API_KEY
doubao:
  # OpenAI 兼容对话接口（给 LangChain4j 的 OpenAiChatModel/OpenAiStreamingChatModel 用）
  chat:
    base-url: https://ark.cn-beijing.volces.com/api/v3
    api-key: 2a468aa0-09c8-46b2-93f1-70b0088d6950
    # 建议填“文本/多模态对话模型”的推理接入点（不要填图生视频模型）
    model-name: ep-20260317160752-mqch4
  # 图生视频等内容生成接口（你 curl 的那个）
  content:
    base-url: https://ark.cn-beijing.volces.com/api/v3
    api-key: 2a468aa0-09c8-46b2-93f1-70b0088d6950
    # 例：doubao-seedance-1-0-pro-fast-251015
    model-name: ep-20260317160752-mqch4

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml #配置mybatis的mapper文件路径
  #原本是mybits映射要在相同的路径下才能映射如
  #src/main/java/org/example/server/mapper
  #XML 应放在src/main/resources/org/example/server/mapper下
  #加了这个就可以直接映射resource下的mapper包里的所有xml文件
  #type-aliases包扫描
  type-aliases-package: org.example.pojo
  #这个就是扫描其他模块pojo，这样里面的bean就不需要写的很详细mybatis就能识别了
