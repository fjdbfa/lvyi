spring:
  application:
    name: server
  # 数据库连接配置
  datasource:
    url: jdbc:mysql://192.168.10.10:3306/huanbao?useUnicode=true&characterEncoding=utf-8&autoReconnect=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: admin
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    servlet:
      content-type: text/html
  data:
    redis:
      host: 192.168.10.10
      port: 6379
      password: 123456
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  servlet:
    multipart:
      max-file-size: 30MB    # 单个文件最大大小（根据需求调整，如10MB、50MB）
      max-request-size: 100MB # 单次请求总文件大小（需大于max-file-size）

